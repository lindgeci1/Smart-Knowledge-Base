name: Trigger auto deployment for smart-knowledge-base-frontend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/smart-knowledge-base-frontend-AutoDeployTrigger-91beede4-5068-4191-a6b5-7346d4ca5cb7.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Validate required frontend secrets
        shell: bash
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          missing=()
          [ -z "$VITE_API_BASE_URL" ] && missing+=("VITE_API_BASE_URL")
          [ -z "$VITE_STRIPE_PUBLISHABLE_KEY" ] && missing+=("VITE_STRIPE_PUBLISHABLE_KEY")
          [ -z "$VITE_GITHUB_CLIENT_ID" ] && missing+=("VITE_GITHUB_CLIENT_ID")
          [ -z "$VITE_GOOGLE_CLIENT_ID" ] && missing+=("VITE_GOOGLE_CLIENT_ID")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SMARTKNOWLEDGEBASEFRONTEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SMARTKNOWLEDGEBASEFRONTEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SMARTKNOWLEDGEBASEFRONTEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/frontend
          registryUrl: docker.io
          registryUsername: ${{ secrets.SMARTKNOWLEDGEBASEFRONTEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SMARTKNOWLEDGEBASEFRONTEND_REGISTRY_PASSWORD }}
          containerAppName: smart-knowledge-base-frontend
          resourceGroup: Smart-Knowledge-Base
          imageToBuild: lindgeci/smart-knowledge-base-frontend:${{ github.sha }}
          buildArguments: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
            VITE_GITHUB_CLIENT_ID=${{ secrets.VITE_GITHUB_CLIENT_ID }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}


